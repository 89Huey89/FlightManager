<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flight Planer">
<title>Flight Planer</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4F0;
  --bg-card: #FFFFFF;
  --bg-hover: #F0EDE8;
  --bg-input: #FAFAF8;
  --border: #E2DED6;
  --border-focus: #2D5A3D;
  --text: #1C2B1F;
  --text-secondary: #6B7A6E;
  --text-muted: #99A59D;
  --accent: #2D5A3D;
  --accent-hover: #1E4A2E;
  --accent-light: #E8F0EB;
  --accent-surface: #F0F5F1;
  --danger: #A63D3D;
  --danger-light: #FBF0F0;
  --gold: #B8963E;
  --gold-light: #FBF8F0;
  --shadow-sm: 0 1px 2px rgba(28,43,31,0.06);
  --shadow-md: 0 2px 8px rgba(28,43,31,0.08);
  --shadow-lg: 0 4px 16px rgba(28,43,31,0.1);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 760px; margin: 0 auto; padding: 20px 16px 120px; }

/* Header */
.header {
  text-align: center; padding: 24px 0 8px;
}
.header-icon {
  width: 40px; height: 40px; margin: 0 auto 12px;
  background: var(--accent); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
}
.header-icon svg { color: #fff; }
.header h1 {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 24px; font-weight: 700; color: var(--text);
  letter-spacing: -0.03em;
}
.header .subtitle {
  font-size: 13px; color: var(--text-muted); margin-top: 2px;
  font-weight: 400; letter-spacing: 0.01em;
}

/* Tabs */
.tabs {
  display: flex; gap: 4px; margin: 20px 0;
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 4px; border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  flex: 1; padding: 10px 6px; border: none; border-radius: var(--radius);
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  font-family: inherit; background: transparent; color: var(--text-muted);
  transition: all 0.2s ease; display: flex; align-items: center;
  justify-content: center; gap: 5px;
}
.tab-btn svg { width: 15px; height: 15px; }
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  background: var(--accent); color: #fff;
  box-shadow: var(--shadow-sm);
}

/* Cards */
.card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  border: 1px solid var(--border); padding: 20px;
  box-shadow: var(--shadow-sm); margin-bottom: 16px;
}
.card-title {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
}

/* Form */
input[type="text"], input[type="date"], select {
  padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; background: var(--bg-input); outline: none;
  font-family: inherit; min-width: 0; color: var(--text);
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--border-focus); }
.field-label {
  display: block; font-size: 11px; font-weight: 600; color: var(--text-muted);
  margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border: none; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; pointer-events: none; }
.btn-primary svg { width: 15px; height: 15px; }
.btn-success { background: #2A7B3F; color: #fff; }
.btn-success:hover { background: #1E6630; }
.btn-outline {
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text-secondary); padding: 6px 14px; font-size: 12px;
}
.btn-outline:hover { background: var(--bg-hover); }
.btn-ghost {
  background: none; border: none; color: var(--text-muted);
  padding: 4px 8px; font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn-ghost:hover { color: var(--text); }
.btn-icon {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  padding: 4px; display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); transition: all 0.15s;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--text); }
.btn-icon.danger:hover { background: var(--danger-light); color: var(--danger); }
.btn-icon svg { width: 16px; height: 16px; }
.btn-lg { padding: 12px 28px; font-size: 14.5px; border-radius: var(--radius); }

/* Chips & Tags */
.member-tag {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px;
  background: var(--accent-surface); border-radius: var(--radius-sm);
  font-size: 13.5px; color: var(--text); font-weight: 500;
  border: 1px solid transparent; transition: all 0.15s;
}
.member-tag:hover { border-color: var(--border); }
.player-chip {
  padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 24px;
  background: var(--bg-card); font-size: 13px; cursor: pointer;
  color: var(--text-secondary); font-family: inherit;
  transition: all 0.2s; font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.player-chip:hover { border-color: var(--accent); color: var(--text); }
.player-chip.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
  box-shadow: 0 2px 6px rgba(45,90,61,0.25);
}

/* Constraint row */
.constraint-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--danger-light); border-radius: var(--radius-sm);
  font-size: 13.5px; border: 1px solid #F0DEDE;
}
.constraint-divider {
  width: 24px; height: 24px; border-radius: 50%; background: #F5E0E0;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.constraint-divider svg { width: 12px; height: 12px; color: var(--danger); }

/* Flight cards */
.flight-card {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 14px 16px; border: 1px solid var(--border);
  box-shadow: var(--shadow-sm); transition: box-shadow 0.2s;
}
.flight-card:hover { box-shadow: var(--shadow-md); }
.flight-num {
  font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px;
}
.flight-num::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.flight-player {
  padding: 3px 0; font-size: 14px; color: var(--text);
  font-weight: 500; display: flex; align-items: center; gap: 6px;
}
.flight-player::before {
  content: ''; width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0; opacity: 0.5;
}

/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-value {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 28px; font-weight: 700; color: var(--accent);
  line-height: 1.1;
}
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.bar-name { font-size: 13px; font-weight: 500; color: var(--text); min-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
.bar-count { font-size: 12px; color: var(--text-muted); min-width: 24px; text-align: right; font-weight: 600; }

/* Utility */
.empty-state {
  text-align: center; color: var(--text-muted); padding: 48px 20px;
  font-size: 14px; line-height: 1.7;
}
.empty-state svg { width: 32px; height: 32px; margin-bottom: 12px; opacity: 0.3; }
.meta { color: var(--text-muted); font-size: 13px; }
.fw600 { font-weight: 600; }
.flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.flex-col { display: flex; flex-direction: column; gap: 8px; }
.chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.grid-sm { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
.between { display: flex; justify-content: space-between; align-items: center; }
.mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; } .mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.saved-badge {
  display: inline-flex; align-items: center; gap: 5px;
  color: #2A7B3F; font-weight: 600; font-size: 13px;
}
.week-header {
  font-family: 'Source Serif 4', Georgia, serif;
  font-weight: 600; font-size: 16px; color: var(--text);
}
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Pair heatmap */
.pair-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.pair-table th, .pair-table td { padding: 6px 8px; text-align: left; }
.pair-table th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; border-bottom: 1px solid var(--border); }
.pair-table td { border-bottom: 1px solid var(--bg-hover); }
.pair-table tr:last-child td { border-bottom: none; }
.pair-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; font-size: 11px; min-width: 28px; text-align: center;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.3s ease forwards; }

/* Data tab */
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #A3822E; }
.data-section-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }

@media (max-width: 480px) {
  .tab-btn span { display: none; }
  .tab-btn svg { width: 18px; height: 18px; }
  .tab-btn { padding: 10px 8px; }
}
</style>
</head>

<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useMemo, createElement: h } = React;

// ── Icons (inline SVG) ──
const icon = (paths, vb="24") => ({ size = 16, color = "currentColor", ...p } = {}) =>
  h("svg", { width: size, height: size, viewBox: "0 0 " + vb + " " + vb,
    fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", ...p }, paths);

const icons = {
  flag: icon([h("path",{key:0,d:"M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"}),h("line",{key:1,x1:4,y1:22,x2:4,y2:15})]),
  users: icon([h("path",{key:0,d:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"}),h("circle",{key:1,cx:9,cy:7,r:4}),h("path",{key:2,d:"M22 21v-2a4 4 0 0 0-3-3.87"}),h("path",{key:3,d:"M16 3.13a4 4 0 0 1 0 7.75"})]),
  ban: icon([h("circle",{key:0,cx:12,cy:12,r:10}),h("path",{key:1,d:"m4.9 4.9 14.2 14.2"})]),
  barChart: icon([h("line",{key:0,x1:12,y1:20,x2:12,y2:10}),h("line",{key:1,x1:18,y1:20,x2:18,y2:4}),h("line",{key:2,x1:6,y1:20,x2:6,y2:16})]),
  calendar: icon([h("rect",{key:0,width:18,height:18,x:3,y:4,rx:2}),h("line",{key:1,x1:16,y1:2,x2:16,y2:6}),h("line",{key:2,x1:8,y1:2,x2:8,y2:6}),h("line",{key:3,x1:3,y1:10,x2:21,y2:10})]),
  plus: icon([h("line",{key:0,x1:12,y1:5,x2:12,y2:19}),h("line",{key:1,x1:5,y1:12,x2:19,y2:12})]),
  x: icon([h("line",{key:0,x1:18,y1:6,x2:6,y2:18}),h("line",{key:1,x1:6,y1:6,x2:18,y2:18})]),
  check: icon([h("polyline",{key:0,points:"20 6 9 17 4 12"})]),
  shuffle: icon([h("polyline",{key:0,points:"16 3 21 3 21 8"}),h("line",{key:1,x1:4,y1:20,x2:21,y2:3}),h("polyline",{key:2,points:"21 16 21 21 16 21"}),h("line",{key:3,x1:15,y1:15,x2:21,y2:21}),h("line",{key:4,x1:4,y1:4,x2:9,y2:9})]),
  history: icon([h("path",{key:0,d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}),h("path",{key:1,d:"M3 3v5h5"}),h("path",{key:2,d:"M12 7v5l4 2"})]),
  trash: icon([h("path",{key:0,d:"M3 6h18"}),h("path",{key:1,d:"M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"}),h("path",{key:2,d:"M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"})]),
  userPlus: icon([h("path",{key:0,d:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"}),h("circle",{key:1,cx:9,cy:7,r:4}),h("line",{key:2,x1:19,y1:8,x2:19,y2:14}),h("line",{key:3,x1:22,y1:11,x2:16,y2:11})]),
  target: icon([h("circle",{key:0,cx:12,cy:12,r:10}),h("circle",{key:1,cx:12,cy:12,r:6}),h("circle",{key:2,cx:12,cy:12,r:2})]),
  trophy: icon([h("path",{key:0,d:"M6 9H4.5a2.5 2.5 0 0 1 0-5H6"}),h("path",{key:1,d:"M18 9h1.5a2.5 2.5 0 0 0 0-5H18"}),h("path",{key:2,d:"M4 22h16"}),h("path",{key:3,d:"M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"}),h("path",{key:4,d:"M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"}),h("path",{key:5,d:"M18 2H6v7a6 6 0 0 0 12 0V2Z"})]),
  arrowDown: icon([h("path",{key:0,d:"m6 9 6 6 6-6"})]),
  download: icon([h("path",{key:0,d:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"}),h("polyline",{key:1,points:"7 10 12 15 17 10"}),h("line",{key:2,x1:12,y1:15,x2:12,y2:3})]),
  upload: icon([h("path",{key:0,d:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"}),h("polyline",{key:1,points:"17 8 12 3 7 8"}),h("line",{key:2,x1:12,y1:3,x2:12,y2:15})]),
  database: icon([h("ellipse",{key:0,cx:12,cy:5,rx:9,ry:3}),h("path",{key:1,d:"M3 5V19A9 3 0 0 0 21 19V5"}),h("path",{key:2,d:"M3 12A9 3 0 0 0 21 12"})]),
};

// ── Data ──
const STORAGE_KEY = "golf-flights-v2";
const defaultState = {
  members: [], constraints: [], pairingHistory: {},
  weeks: [], settings: { defaultFlightSize: 4 }, nextMemberId: 1,
};
function load() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; } }
function save(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

// ── Import/Export Helpers ──
function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a);
  a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportJSON(data) {
  const date = new Date().toISOString().split("T")[0];
  downloadFile("flight-planer-backup-" + date + ".json", JSON.stringify(data, null, 2), "application/json");
}

function exportMembersCSV(members) {
  const date = new Date().toISOString().split("T")[0];
  const lines = ["Id;Name"];
  members.forEach(m => lines.push(m.id + ";" + m.name.replace(/;/g, ",")));
  downloadFile("flight-planer-mitglieder-" + date + ".csv", "\uFEFF" + lines.join("\n"), "text/csv;charset=utf-8");
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsText(file);
  });
}

function validateBackup(obj) {
  return obj && Array.isArray(obj.members) && Array.isArray(obj.constraints)
    && Array.isArray(obj.weeks) && typeof obj.pairingHistory === "object"
    && typeof obj.settings === "object" && typeof obj.nextMemberId === "number";
}

function parseCSVMembers(text) {
  const clean = text.replace(/^\uFEFF/, "");
  const delim = (clean.split("\n")[0] || "").includes(";") ? ";" : ",";
  const lines = clean.split(/\r?\n/).filter(l => l.trim());
  const first = lines[0].toLowerCase().trim();
  const hasHeader = first.includes("name") || first.includes("id");
  const dataLines = hasHeader ? lines.slice(1) : lines;
  return dataLines.map(line => {
    const parts = line.split(delim).map(s => s.trim().replace(/^"|"$/g, ""));
    if (parts.length >= 2 && /^\d+$/.test(parts[0])) return parts[1];
    return parts[0];
  }).filter(n => n && n.length > 0);
}

// ── Algorithm ──
function pairKey(a, b) { return a < b ? a+"-"+b : b+"-"+a; }
function isConstrained(a, b, cs) { return cs.some(c => (c[0]===a&&c[1]===b)||(c[0]===b&&c[1]===a)); }

function generateFlights(playerIds, constraints, history, flightSize) {
  if (playerIds.length < 2) return { flights: [playerIds] };
  const n = playerIds.length;
  let sizes = [], rem = n;
  while (rem > 0) {
    if (rem >= flightSize) {
      if (rem - flightSize > 0 && rem - flightSize < 2) {
        const half = Math.ceil(rem / 2); sizes.push(half, rem - half); rem = 0;
      } else { sizes.push(flightSize); rem -= flightSize; }
    } else if (rem >= 2) { sizes.push(rem); rem = 0; }
    else { sizes[sizes.length - 1]++; rem = 0; }
  }
  const cost = (a, b) => isConstrained(a, b, constraints) ? 999999 : (history[pairKey(a, b)] || 0);
  let bestFlights = null, bestCost = Infinity;
  for (let at = 0; at < 30; at++) {
    const sh = [...playerIds].sort(() => Math.random() - 0.5);
    const assigned = new Set(); const flights = []; let tc = 0;
    for (const size of sizes) {
      const fl = [];
      for (const p of sh) { if (!assigned.has(p)) { fl.push(p); assigned.add(p); break; } }
      while (fl.length < size) {
        let bp = null, bc = Infinity;
        for (const p of sh) {
          if (assigned.has(p)) continue;
          let pc = 0, v = false;
          for (const f of fl) { if (isConstrained(p, f, constraints)) { v = true; break; } pc += cost(p, f); }
          if (v) pc = 999999;
          if (pc < bc) { bc = pc; bp = p; }
        }
        if (bp !== null) { fl.push(bp); assigned.add(bp); tc += bc; } else break;
      }
      flights.push(fl);
    }
    if (tc < bestCost) { bestCost = tc; bestFlights = flights; }
  }
  return { flights: bestFlights || [[...playerIds]] };
}

// ── Members Tab ──
function MembersTab({ data, setData }) {
  const [name, setName] = useState("");
  const add = () => {
    const t = name.trim();
    if (!t || data.members.some(m => m.name.toLowerCase() === t.toLowerCase())) return;
    setData(d => ({
      ...d,
      members: [...d.members, { id: d.nextMemberId, name: t }].sort((a, b) => a.name.localeCompare(b.name, "de")),
      nextMemberId: d.nextMemberId + 1,
    }));
    setName("");
  };
  const remove = id => {
    if (!confirm("Mitglied wirklich entfernen?")) return;
    setData(d => ({
      ...d, members: d.members.filter(m => m.id !== id),
      constraints: d.constraints.filter(c => c[0] !== id && c[1] !== id),
    }));
  };

  return h("div", { className: "animate-in" },
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Neues Mitglied"),
      h("div", { className: "flex-row" },
        h("input", { type: "text", placeholder: "Vor- und Nachname", value: name,
          onChange: e => setName(e.target.value), onKeyDown: e => e.key === "Enter" && add(),
          style: { flex: 1, minWidth: 160 }
        }),
        h("button", { className: "btn btn-primary", onClick: add },
          h(icons.userPlus, { size: 15 }), "Hinzufügen"
        )
      )
    ),
    h("div", { className: "between mb-16" },
      h("span", { className: "meta" }, data.members.length + " Mitglieder registriert"),
    ),
    h("div", { className: "chip-wrap" },
      data.members.map(m =>
        h("div", { className: "member-tag", key: m.id },
          h("span", null, m.name),
          h("button", { className: "btn-icon danger", onClick: () => remove(m.id), title: "Entfernen" },
            h(icons.x, { size: 14 })
          )
        )
      )
    ),
    data.members.length === 0 && h("div", { className: "empty-state" },
      h(icons.users, { size: 32 }),
      h("div", null, "Noch keine Mitglieder angelegt."),
      h("div", null, "Fügen Sie die Spieler des Clubs hinzu.")
    )
  );
}

// ── Constraints Tab ──
function ConstraintsTab({ data, setData }) {
  const [a, setA] = useState("");
  const [b, setB] = useState("");
  const add = () => {
    const idA = parseInt(a), idB = parseInt(b);
    if (!idA || !idB || idA === idB) return;
    if (data.constraints.some(c => (c[0]===idA&&c[1]===idB)||(c[0]===idB&&c[1]===idA))) return;
    setData(d => ({ ...d, constraints: [...d.constraints, [idA, idB]] }));
    setA(""); setB("");
  };
  const remove = i => setData(d => ({ ...d, constraints: d.constraints.filter((_, j) => j !== i) }));
  const nameOf = id => data.members.find(m => m.id === id)?.name || "?";

  return h("div", { className: "animate-in" },
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Ausschluss hinzufügen"),
      h("p", { className: "meta mb-16", style: { lineHeight: 1.5 } },
        "Paare, die nicht in denselben Flight eingeteilt werden."
      ),
      h("div", { className: "flex-row" },
        h("select", { value: a, onChange: e => setA(e.target.value), style: { flex: 1, minWidth: 110 } },
          h("option", { value: "" }, "Spieler 1"),
          data.members.map(m => h("option", { key: m.id, value: m.id }, m.name))
        ),
        h("select", { value: b, onChange: e => setB(e.target.value), style: { flex: 1, minWidth: 110 } },
          h("option", { value: "" }, "Spieler 2"),
          data.members.filter(m => m.id !== parseInt(a)).map(m => h("option", { key: m.id, value: m.id }, m.name))
        ),
        h("button", { className: "btn btn-primary", onClick: add },
          h(icons.plus, { size: 15 }), "Hinzufügen"
        )
      )
    ),
    h("div", { className: "flex-col" },
      data.constraints.map((c, i) =>
        h("div", { key: i, className: "constraint-item" },
          h("span", { className: "fw600", style: { flex: 1 } }, nameOf(c[0])),
          h("div", { className: "constraint-divider" }, h(icons.ban, { size: 12 })),
          h("span", { className: "fw600", style: { flex: 1 } }, nameOf(c[1])),
          h("button", { className: "btn-icon danger", onClick: () => remove(i) }, h(icons.x, { size: 14 }))
        )
      )
    ),
    data.constraints.length === 0 && h("div", { className: "empty-state" },
      h(icons.ban, { size: 32 }),
      h("div", null, "Keine Ausschlüsse definiert.")
    )
  );
}

// ── Week Tab ──
function WeekTab({ data, setData }) {
  const today = new Date();
  const mo = today.getDay() === 0 ? -6 : 1 - today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() + mo);
  const defDate = monday.toISOString().split("T")[0];

  const [weekDate, setWeekDate] = useState(defDate);
  const [selected, setSelected] = useState(new Set());
  const [flights, setFlights] = useState(null);
  const [flightSize, setFlightSize] = useState(data.settings.defaultFlightSize);
  const [saved, setSaved] = useState(false);

  const existing = data.weeks.find(w => w.date === weekDate);
  useEffect(() => {
    if (existing) {
      setSelected(new Set(existing.playerIds));
      setFlights(existing.flights);
      setFlightSize(existing.flightSize);
      setSaved(true);
    } else { setSelected(new Set()); setFlights(null); setSaved(false); }
  }, [weekDate]);

  const toggle = id => {
    setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
    setFlights(null); setSaved(false);
  };
  const generate = () => {
    const ids = [...selected]; if (ids.length < 2) return;
    setFlights(generateFlights(ids, data.constraints, data.pairingHistory, flightSize).flights);
    setSaved(false);
  };
  const saveWeek = () => {
    if (!flights) return;
    const nh = { ...data.pairingHistory };
    for (const fl of flights) for (let i=0;i<fl.length;i++) for (let j=i+1;j<fl.length;j++) {
      const k = pairKey(fl[i], fl[j]); nh[k] = (nh[k]||0) + 1;
    }
    setData(d => {
      const nw = d.weeks.filter(w => w.date !== weekDate);
      nw.push({ date: weekDate, playerIds: [...selected], flights, flightSize });
      nw.sort((a, b) => b.date.localeCompare(a.date));
      return { ...d, weeks: nw, pairingHistory: nh };
    });
    setSaved(true);
  };
  const nameOf = id => data.members.find(m => m.id === id)?.name || "?";
  const weekLabel = new Date(weekDate+"T00:00:00").toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"});

  return h("div", { className: "animate-in" },
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Spieltag konfigurieren"),
      h("div", { className: "flex-row" },
        h("div", { style: { flex: 1 } },
          h("div", { className: "field-label" }, "Datum"),
          h("input", { type: "date", value: weekDate, onChange: e => setWeekDate(e.target.value), style: { width: "100%" } })
        ),
        h("div", null,
          h("div", { className: "field-label" }, "Flight-Grösse"),
          h("select", { value: flightSize, onChange: e => { setFlightSize(parseInt(e.target.value)); setFlights(null); setSaved(false); } },
            h("option", { value: 3 }, "3er Flights"),
            h("option", { value: 4 }, "4er Flights")
          )
        )
      )
    ),
    data.members.length === 0
      ? h("div", { className: "empty-state" },
          h(icons.flag, { size: 32 }),
          h("div", null, "Erst Mitglieder anlegen, dann den Spieltag planen.")
        )
      : h("div", null,
          h("div", { className: "between mb-12" },
            h("span", { className: "meta" }, selected.size + " von " + data.members.length + " Spielern"),
            h("div", { className: "flex-row" },
              h("button", { className: "btn btn-outline", onClick: () => { setSelected(new Set(data.members.map(m=>m.id))); setFlights(null); setSaved(false); } }, "Alle"),
              h("button", { className: "btn btn-outline", onClick: () => { setSelected(new Set()); setFlights(null); setSaved(false); } }, "Keine")
            )
          ),
          h("div", { className: "chip-wrap mb-24" },
            data.members.map(m =>
              h("button", { key: m.id, className: "player-chip" + (selected.has(m.id) ? " active" : ""),
                onClick: () => toggle(m.id) }, m.name)
            )
          ),
          h("div", { className: "flex-row mb-24" },
            h("button", { className: "btn btn-primary btn-lg", disabled: selected.size < 2, onClick: generate },
              h(icons.shuffle, { size: 16 }), "Flights generieren"
            ),
            flights && !saved && h("button", { className: "btn btn-success btn-lg", onClick: saveWeek },
              h(icons.check, { size: 16 }), "Speichern"
            ),
            saved && h("span", { className: "saved-badge" }, h(icons.check, { size: 16 }), "Gespeichert")
          ),
          flights && h("div", null,
            h("div", { className: "between mb-16" },
              h("span", { className: "week-header" }, weekLabel),
              h("span", { className: "meta" }, flights.length + " Flights")
            ),
            h("div", { className: "grid" },
              flights.map((fl, i) =>
                h("div", { key: i, className: "flight-card" },
                  h("div", { className: "flight-num" }, "Flight " + (i + 1)),
                  fl.map(id => h("div", { key: id, className: "flight-player" }, nameOf(id)))
                )
              )
            )
          )
        )
  );
}

// ── History Tab ──
function HistoryTab({ data, setData }) {
  const nameOf = id => data.members.find(m => m.id === id)?.name || "#"+id;
  const deleteWeek = date => {
    if (!confirm("Woche löschen? Die Paarungshistorie wird entsprechend angepasst.")) return;
    const week = data.weeks.find(w => w.date === date);
    if (!week) return;
    const nh = { ...data.pairingHistory };
    for (const fl of week.flights) for (let i=0;i<fl.length;i++) for (let j=i+1;j<fl.length;j++) {
      const k = pairKey(fl[i], fl[j]); nh[k] = Math.max(0, (nh[k]||0)-1);
      if (nh[k]===0) delete nh[k];
    }
    setData(d => ({ ...d, weeks: d.weeks.filter(w => w.date !== date), pairingHistory: nh }));
  };
  const resetAll = () => {
    if (!confirm("Alle Wochen und die gesamte Paarungshistorie zurücksetzen?")) return;
    setData(d => ({ ...d, weeks: [], pairingHistory: {} }));
  };

  return h("div", { className: "animate-in" },
    h("div", { className: "between mb-20" },
      h("span", { className: "meta" }, data.weeks.length + " gespeicherte Spieltage"),
      data.weeks.length > 0 && h("button", { className: "btn btn-outline", onClick: resetAll, style: { color: "var(--danger)" } },
        h(icons.trash, { size: 14 }), "Zurücksetzen"
      )
    ),
    data.weeks.length === 0 && h("div", { className: "empty-state" },
      h(icons.history, { size: 32 }),
      h("div", null, "Noch keine Spieltage gespeichert.")
    ),
    data.weeks.map(w => {
      const label = new Date(w.date+"T00:00:00").toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      return h("div", { key: w.date, className: "card" },
        h("div", { className: "between mb-12" },
          h("div", { className: "week-header" }, label),
          h("button", { className: "btn-icon danger", onClick: () => deleteWeek(w.date), title: "Löschen" },
            h(icons.trash, { size: 14 })
          )
        ),
        h("span", { className: "meta mb-12", style: { display: "block" } },
          w.flights.length + " Flights · " + w.playerIds.length + " Spieler · " + w.flightSize + "er Flights"
        ),
        h("div", { className: "grid-sm" },
          w.flights.map((fl, i) =>
            h("div", { key: i, className: "flight-card", style: { padding: "10px 14px" } },
              h("div", { className: "flight-num", style: { fontSize: 10 } }, "Flight "+(i+1)),
              fl.map(id => h("div", { key: id, style: { fontSize: 13, padding: "2px 0", color: "var(--text)", fontWeight: 500 } }, nameOf(id)))
            )
          )
        )
      );
    })
  );
}

// ── Stats Tab ──
function StatsTab({ data }) {
  const nameOf = id => data.members.find(m => m.id === id)?.name || "#"+id;

  const stats = useMemo(() => {
    const totalWeeks = data.weeks.length;
    const totalFlights = data.weeks.reduce((s, w) => s + w.flights.length, 0);
    const participation = {};
    data.weeks.forEach(w => w.playerIds.forEach(id => { participation[id] = (participation[id]||0) + 1; }));
    const pairs = Object.entries(data.pairingHistory).filter(([_,v]) => v > 0)
      .map(([k, v]) => { const [a, b] = k.split("-").map(Number); return { a, b, count: v }; })
      .sort((a, b) => b.count - a.count);

    const participationList = Object.entries(participation)
      .map(([id, count]) => ({ id: parseInt(id), count }))
      .sort((a, b) => b.count - a.count);

    const maxParticipation = participationList.length > 0 ? participationList[0].count : 0;
    const maxPair = pairs.length > 0 ? pairs[0].count : 0;
    const totalUniqueParticipants = Object.keys(participation).length;
    const avgFlightSize = totalFlights > 0
      ? (data.weeks.reduce((s, w) => s + w.flights.reduce((ss, f) => ss + f.length, 0), 0) / totalFlights).toFixed(1)
      : 0;

    return { totalWeeks, totalFlights, totalUniqueParticipants, avgFlightSize,
      participationList, maxParticipation, pairs, maxPair };
  }, [data]);

  if (stats.totalWeeks === 0) {
    return h("div", { className: "animate-in" },
      h("div", { className: "empty-state" },
        h(icons.barChart, { size: 32 }),
        h("div", null, "Noch keine Daten vorhanden."),
        h("div", null, "Statistiken werden nach dem ersten Spieltag angezeigt.")
      )
    );
  }

  return h("div", { className: "animate-in" },
    h("div", { className: "stat-grid mb-24" },
      h("div", { className: "stat-box" },
        h("div", { className: "stat-value" }, stats.totalWeeks),
        h("div", { className: "stat-label" }, "Spieltage")
      ),
      h("div", { className: "stat-box" },
        h("div", { className: "stat-value" }, stats.totalFlights),
        h("div", { className: "stat-label" }, "Flights ges.")
      ),
      h("div", { className: "stat-box" },
        h("div", { className: "stat-value" }, stats.totalUniqueParticipants),
        h("div", { className: "stat-label" }, "Aktive Spieler")
      ),
      h("div", { className: "stat-box" },
        h("div", { className: "stat-value" }, stats.avgFlightSize),
        h("div", { className: "stat-label" }, "Ø Flight-Grösse")
      )
    ),

    // Participation ranking
    stats.participationList.length > 0 && h("div", { className: "card mb-16" },
      h("div", { className: "card-title" }, "Teilnahme-Ranking"),
      stats.participationList.slice(0, 15).map((p, i) =>
        h("div", { key: p.id, className: "bar-row" },
          h("span", { className: "bar-name" }, (i+1) + ". " + nameOf(p.id)),
          h("div", { className: "bar-track" },
            h("div", { className: "bar-fill", style: { width: (p.count / stats.maxParticipation * 100) + "%" } })
          ),
          h("span", { className: "bar-count" }, p.count + "×")
        )
      )
    ),

    // Most frequent pairs
    stats.pairs.length > 0 && h("div", { className: "card" },
      h("div", { className: "card-title" }, "Häufigste Paarungen"),
      h("table", { className: "pair-table" },
        h("thead", null,
          h("tr", null,
            h("th", null, "Spieler A"),
            h("th", null, "Spieler B"),
            h("th", { style: { textAlign: "right" } }, "Zusammen")
          )
        ),
        h("tbody", null,
          stats.pairs.slice(0, 20).map((p, i) => {
            const heatColor = p.count >= 4 ? "#D4A843" : p.count >= 3 ? "#E8C97A" : p.count >= 2 ? "#D5E0D5" : "var(--accent-surface)";
            return h("tr", { key: i },
              h("td", null, nameOf(p.a)),
              h("td", null, nameOf(p.b)),
              h("td", { style: { textAlign: "right" } },
                h("span", { className: "pair-badge", style: { background: heatColor, color: p.count >= 3 ? "#5A4010" : "var(--text)" } }, p.count + "×")
              )
            );
          })
        )
      )
    )
  );
}

// ── Data Tab ──
function DataTab({ data, setData }) {
  const jsonInputRef = React.useRef(null);
  const csvInputRef = React.useRef(null);

  const handleJSONImport = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await readFileAsText(file);
      const parsed = JSON.parse(text);
      if (!validateBackup(parsed)) { alert("Ungültige Backup-Datei. Die Datei enthält nicht alle erforderlichen Daten."); return; }
      if (!confirm("Alle aktuellen Daten werden durch das Backup ersetzt. Fortfahren?")) return;
      setData(parsed);
      alert("Backup erfolgreich importiert!");
    } catch { alert("Fehler beim Lesen der Datei. Bitte eine gültige JSON-Datei wählen."); }
    e.target.value = "";
  };

  const handleCSVImport = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await readFileAsText(file);
      const names = parseCSVMembers(text);
      if (names.length === 0) { alert("Keine Mitglieder in der CSV-Datei gefunden."); return; }
      const existingNames = new Set(data.members.map(m => m.name.toLowerCase()));
      const newNames = names.filter(n => !existingNames.has(n.toLowerCase()));
      if (newNames.length === 0) { alert("Alle " + names.length + " Mitglieder aus der Datei sind bereits vorhanden."); return; }
      const msg = newNames.length + " neue Mitglieder gefunden" +
        (names.length - newNames.length > 0 ? " (" + (names.length - newNames.length) + " bereits vorhanden)" : "") +
        ".\n\nNeue Mitglieder:\n" + newNames.join(", ") + "\n\nHinzufügen?";
      if (!confirm(msg)) return;
      setData(d => {
        let nextId = d.nextMemberId;
        const added = newNames.map(n => ({ id: nextId++, name: n }));
        return {
          ...d,
          members: [...d.members, ...added].sort((a, b) => a.name.localeCompare(b.name, "de")),
          nextMemberId: nextId,
        };
      });
      alert(newNames.length + " Mitglieder erfolgreich importiert!");
    } catch { alert("Fehler beim Lesen der CSV-Datei."); }
    e.target.value = "";
  };

  const startNewSeason = () => {
    if (data.weeks.length === 0) { alert("Es gibt keine Spieltage zum Zurücksetzen."); return; }
    if (!confirm("Neue Saison starten?\n\nEs wird automatisch ein Backup heruntergeladen.\nDanach werden alle Spieltage und die Paarungshistorie gelöscht.\nMitglieder und Ausschlüsse bleiben erhalten.")) return;
    exportJSON(data);
    setData(d => ({ ...d, weeks: [], pairingHistory: {} }));
    alert("Neue Saison gestartet! Backup wurde heruntergeladen.");
  };

  return h("div", { className: "animate-in" },
    // Hidden file inputs
    h("input", { type: "file", accept: ".json", ref: jsonInputRef, style: { display: "none" }, onChange: handleJSONImport }),
    h("input", { type: "file", accept: ".csv,.txt", ref: csvInputRef, style: { display: "none" }, onChange: handleCSVImport }),

    // Card 1: Full Backup
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Vollständiges Backup"),
      h("p", { className: "data-section-desc" },
        "Sichern und Wiederherstellen aller Daten (Mitglieder, Ausschlüsse, Spieltage, Statistiken)."
      ),
      h("div", { className: "flex-row" },
        h("button", { className: "btn btn-primary", onClick: () => exportJSON(data) },
          h(icons.download, { size: 15 }), "Backup exportieren"
        ),
        h("button", { className: "btn btn-outline", onClick: () => jsonInputRef.current.click() },
          h(icons.upload, { size: 15 }), "Backup importieren"
        )
      )
    ),

    // Card 2: Members CSV
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Mitglieder CSV"),
      h("p", { className: "data-section-desc" },
        "Mitgliederliste als CSV exportieren oder neue Mitglieder aus einer CSV-Datei importieren. Bereits vorhandene Mitglieder werden übersprungen."
      ),
      h("div", { className: "flex-row" },
        h("button", { className: "btn btn-primary", onClick: () => exportMembersCSV(data.members), disabled: data.members.length === 0 },
          h(icons.download, { size: 15 }), "Mitglieder exportieren"
        ),
        h("button", { className: "btn btn-outline", onClick: () => csvInputRef.current.click() },
          h(icons.upload, { size: 15 }), "Mitglieder importieren"
        )
      ),
      data.members.length > 0 && h("div", { className: "meta", style: { marginTop: 12 } },
        data.members.length + " Mitglieder · CSV-Format: Id;Name"
      )
    ),

    // Card 3: New Season
    h("div", { className: "card" },
      h("div", { className: "card-title" }, "Neue Saison"),
      h("p", { className: "data-section-desc" },
        "Startet eine neue Saison. Alle Spieltage und die Paarungshistorie werden zurückgesetzt. Mitglieder und Ausschlüsse bleiben erhalten. Vorher wird automatisch ein Backup erstellt."
      ),
      h("div", { className: "flex-row" },
        h("button", { className: "btn btn-gold btn-lg", onClick: startNewSeason },
          h(icons.trophy, { size: 16 }), "Neue Saison starten"
        )
      ),
      data.weeks.length > 0 && h("div", { className: "meta", style: { marginTop: 12 } },
        "Aktuelle Saison: " + data.weeks.length + " Spieltage gespeichert"
      )
    )
  );
}

// ── Tabs Config ──
const tabConfig = [
  { id: "week", label: "Spieltag", Icon: icons.flag },
  { id: "members", label: "Mitglieder", Icon: icons.users },
  { id: "constraints", label: "Ausschlüsse", Icon: icons.ban },
  { id: "stats", label: "Statistik", Icon: icons.barChart },
  { id: "history", label: "Historie", Icon: icons.history },
  { id: "data", label: "Daten", Icon: icons.database },
];

// ── App ──
function App() {
  const [data, setData] = useState(() => load() || defaultState);
  const [tab, setTab] = useState("week");

  useEffect(() => { save(data); }, [data]);

  return h("div", null,
    h("div", { className: "header" },
      h("div", { className: "header-icon" }, h(icons.flag, { size: 20, color: "#fff" })),
      h("h1", null, "Flight Planer"),
      h("p", { className: "subtitle" }, "Automatische Flight-Einteilung")
    ),
    h("div", { className: "tabs" },
      tabConfig.map(t =>
        h("button", {
          key: t.id, className: "tab-btn" + (tab === t.id ? " active" : ""),
          onClick: () => setTab(t.id)
        }, h(t.Icon, { size: 15 }), h("span", null, t.label))
      )
    ),
    tab === "members" && h(MembersTab, { data, setData }),
    tab === "constraints" && h(ConstraintsTab, { data, setData }),
    tab === "week" && h(WeekTab, { data, setData }),
    tab === "stats" && h(StatsTab, { data }),
    tab === "history" && h(HistoryTab, { data, setData }),
    tab === "data" && h(DataTab, { data, setData })
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App));
</script>
</body>
